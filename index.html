<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고급 계산기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }
        .btn-hover {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-hover:active {
            transform: scale(0.95);
        }
        #display-container {
            word-wrap: break-word;
            word-break: break-all;
        }
    </style>
</head>
<body class="p-4">

    <div class="w-full max-w-sm glass-morphism rounded-3xl p-6 space-y-4">
        <!-- Display Screen -->
        <div id="display-container" class="bg-white/50 rounded-2xl p-6 text-right mb-4 min-h-[140px] flex flex-col justify-end">
            <div id="history" class="text-gray-400 text-sm h-6 overflow-hidden"></div>
            <div id="current" class="text-gray-800 text-4xl font-semibold truncate">0</div>
        </div>

        <!-- Buttons Grid -->
        <div class="grid grid-cols-4 gap-3">
            <!-- Row 1 -->
            <button onclick="clearDisplay()" class="col-span-2 bg-red-100 text-red-600 font-semibold p-4 rounded-2xl btn-hover hover:bg-red-200">AC</button>
            <button onclick="deleteLast()" class="bg-gray-200 text-gray-700 font-semibold p-4 rounded-2xl btn-hover hover:bg-gray-300">DEL</button>
            <button onclick="appendOperator('/')" class="bg-indigo-500 text-white font-semibold p-4 rounded-2xl btn-hover hover:bg-indigo-600">÷</button>

            <!-- Row 2 -->
            <button onclick="appendNumber('7')" class="bg-white text-gray-700 font-semibold p-4 rounded-2xl btn-hover hover:bg-gray-50 shadow-sm">7</button>
            <button onclick="appendNumber('8')" class="bg-white text-gray-700 font-semibold p-4 rounded-2xl btn-hover hover:bg-gray-50 shadow-sm">8</button>
            <button onclick="appendNumber('9')" class="bg-white text-gray-700 font-semibold p-4 rounded-2xl btn-hover hover:bg-gray-50 shadow-sm">9</button>
            <button onclick="appendOperator('*')" class="bg-indigo-500 text-white font-semibold p-4 rounded-2xl btn-hover hover:bg-indigo-600">×</button>

            <!-- Row 3 -->
            <button onclick="appendNumber('4')" class="bg-white text-gray-700 font-semibold p-4 rounded-2xl btn-hover hover:bg-gray-50 shadow-sm">4</button>
            <button onclick="appendNumber('5')" class="bg-white text-gray-700 font-semibold p-4 rounded-2xl btn-hover hover:bg-gray-50 shadow-sm">5</button>
            <button onclick="appendNumber('6')" class="bg-white text-gray-700 font-semibold p-4 rounded-2xl btn-hover hover:bg-gray-50 shadow-sm">6</button>
            <button onclick="appendOperator('-')" class="bg-indigo-500 text-white font-semibold p-4 rounded-2xl btn-hover hover:bg-indigo-600">−</button>

            <!-- Row 4 -->
            <button onclick="appendNumber('1')" class="bg-white text-gray-700 font-semibold p-4 rounded-2xl btn-hover hover:bg-gray-50 shadow-sm">1</button>
            <button onclick="appendNumber('2')" class="bg-white text-gray-700 font-semibold p-4 rounded-2xl btn-hover hover:bg-gray-50 shadow-sm">2</button>
            <button onclick="appendNumber('3')" class="bg-white text-gray-700 font-semibold p-4 rounded-2xl btn-hover hover:bg-gray-50 shadow-sm">3</button>
            <button onclick="appendOperator('+')" class="bg-indigo-500 text-white font-semibold p-4 rounded-2xl btn-hover hover:bg-indigo-600">+</button>

            <!-- Row 5 -->
            <button onclick="appendNumber('0')" class="col-span-2 bg-white text-gray-700 font-semibold p-4 rounded-2xl btn-hover hover:bg-gray-50 shadow-sm">0</button>
            <button onclick="appendNumber('.')" class="bg-white text-gray-700 font-semibold p-4 rounded-2xl btn-hover hover:bg-gray-50 shadow-sm">.</button>
            <button onclick="calculate()" class="bg-emerald-500 text-white font-semibold p-4 rounded-2xl btn-hover hover:bg-emerald-600">=</button>
        </div>
    </div>

    <script>
        const currentDisplay = document.getElementById('current');
        const historyDisplay = document.getElementById('history');
        let currentInput = '0';
        let previousInput = '';
        let operator = null;
        let shouldResetScreen = false;

        function appendNumber(number) {
            if (currentInput === '0' || shouldResetScreen) {
                resetScreen();
            }
            if (number === '.' && currentInput.includes('.')) return;
            currentInput += number;
            updateDisplay();
        }

        function resetScreen() {
            currentInput = '';
            shouldResetScreen = false;
        }

        function clearDisplay() {
            currentInput = '0';
            previousInput = '';
            operator = null;
            historyDisplay.innerText = '';
            updateDisplay();
        }

        function deleteLast() {
            if (currentInput.length === 1) {
                currentInput = '0';
            } else {
                currentInput = currentInput.slice(0, -1);
            }
            updateDisplay();
        }

        function updateDisplay() {
            currentDisplay.innerText = currentInput;
        }

        function appendOperator(op) {
            if (operator !== null) calculate();
            previousInput = currentInput;
            operator = op;
            historyDisplay.innerText = `${previousInput} ${getOpChar(op)}`;
            shouldResetScreen = true;
        }

        function getOpChar(op) {
            switch(op) {
                case '/': return '÷';
                case '*': return '×';
                case '-': return '−';
                case '+': return '+';
                default: return op;
            }
        }

        function calculate() {
            if (operator === null || shouldResetScreen) return;
            if (operator === '/' && currentInput === '0') {
                showToast("0으로 나눌 수 없습니다.");
                clearDisplay();
                return;
            }

            const prev = parseFloat(previousInput);
            const current = parseFloat(currentInput);
            let result;

            switch (operator) {
                case '+': result = prev + current; break;
                case '-': result = prev - current; break;
                case '*': result = prev * current; break;
                case '/': result = prev / current; break;
                default: return;
            }

            // 부동소수점 오차 방지 (최대 10자리)
            currentInput = Math.round(result * 10000000000) / 10000000000;
            historyDisplay.innerText = `${prev} ${getOpChar(operator)} ${current} =`;
            operator = null;
            shouldResetScreen = true;
            updateDisplay();
        }

        // 간단한 알림 기능
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-lg transition-opacity duration-300';
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        // 키보드 지원
        window.addEventListener('keydown', (e) => {
            if (e.key >= 0 && e.key <= 9) appendNumber(e.key);
            if (e.key === '.') appendNumber('.');
            if (e.key === '=' || e.key === 'Enter') calculate();
            if (e.key === 'Backspace') deleteLast();
            if (e.key === 'Escape') clearDisplay();
            if (['+', '-', '*', '/'].includes(e.key)) appendOperator(e.key);
        });
    </script>
</body>
</html>
