<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>전 영업일 미국시황 브리핑</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="header">
      <p class="eyebrow">DAILY BRIEF</p>
      <h1>전 영업일 미국시황</h1>
      <p class="desc">
        미국 주요 지수의 직전 거래일 종가 기준 요약입니다. 데이터 소스: Yahoo Finance.
      </p>
      <div class="meta">
        <span id="updatedAt">업데이트 준비 중...</span>
        <span id="nextRefresh">다음 새로고침 계산 중...</span>
      </div>
      <button id="refreshBtn" type="button" class="btn">지금 새로고침</button>
    </header>

    <section class="panel">
      <h2>시장 요약</h2>
      <p id="marketSummary" class="summary">데이터를 불러오는 중입니다...</p>
    </section>

    <section class="panel">
      <h2>주요 지수</h2>
      <div id="cards" class="cards"></div>
    </section>

    <section class="panel">
      <h2>시사점</h2>
      <ul id="insights" class="insights"></ul>
    </section>

    <p id="errorMsg" class="error" hidden></p>
  </main>

  <script src="app.js"></script>
</body>
</html>
